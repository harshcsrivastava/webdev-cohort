<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1rem;
        padding: 2rem;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: -1;
      }

      .container {
        max-width: 800px;
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 3rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 2rem;
        font-size: 2.5rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        letter-spacing: 1px;
      }

      .input-container {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        align-items: stretch;
      }

      #todoInput {
        flex: 1;
        padding: 1.2rem 2rem;
        font-size: 1.1rem;
        border: none;
        border-radius: 50px;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        outline: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        min-width: 0;
      }

      #todoInput:focus {
        background: white;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }

      #todoInput::placeholder {
        color: #888;
      }

      #createButton {
        padding: 1.2rem 2.5rem;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
      }

      #createButton:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
      }

      #createButton:active {
        transform: translateY(0);
      }

      #todos {
        margin-top: 2rem;
      }

      #todoContainer {
        list-style: none;
      }

      #todoContainer li {
        background: rgba(255, 255, 255, 0.15);
        padding: 1rem 1.5rem;
        margin-bottom: 0.8rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 1rem;
        display: flex;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        word-wrap: break-word;
      }

      #todoContainer li::before {
        content: "✓";
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.5);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-right: 1rem;
        font-size: 0.8rem;
        color: transparent;
        transition: all 0.3s ease;
      }

      #todoContainer li:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateX(10px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
      }

      #todoContainer li:hover::before {
        background: rgba(255, 255, 255, 0.3);
        color: white;
        border-color: white;
      }

      #todoContainer li:active {
        transform: scale(0.98);
      }

      @media (max-width: 768px) {
        body {
          padding: 1rem;
        }

        .container {
          padding: 1.5rem;
        }

        h1 {
          font-size: 2rem;
        }

        .input-container {
          flex-direction: column;
        }

        #createButton {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 My Todo List</h1>
      <div class="input-container">
        <input
          type="text"
          placeholder="Enter your task here..."
          name=""
          id="todoInput"
        />
        <button id="createButton">Create</button>
      </div>

      <div id="todos">
        <ul id="todoContainer">
          <li onclick="removeTask()" id="onBoardTask">Add your first task.</li>
        </ul>
      </div>
    </div>

    <script>
      const createButtonRef = document.getElementById("createButton");
      const todoInputRef = document.getElementById("todoInput");
      const todoContainerRef = document.getElementById("todoContainer");

      (async () => {
        fetch("https://api.freeapi.app/api/v1/public/quotes", {
          method: "GET",
        })
          .then((response) => response.json())
          .then((data) => {
            console.log(data);
            for (const obj of data.data.data) {
              const li = document.createElement("li");
              li.innerText = obj.content;
              todoContainerRef.append(li);
              li.addEventListener("click", function () {
                li.remove();
              });
            }
          });
      })();

      function removeTask() {
        const onBoardTaskRef = document.getElementById("onBoardTask");
        onBoardTaskRef.remove();
      }
      createButtonRef.addEventListener("click", function () {
        const value = todoInputRef.value;
        console.log(value);

        // Creating a new li for every todo
        const li = document.createElement("li"); //<li></li>
        li.innerText = value; //<li> value </li>

        // Remove li when clicked
        li.addEventListener("click", function () {
          li.remove();
        });

        todoContainerRef.append(li);

        // sab natak karne ke baad todoInputRef ko khali bhi kar hi do
        todoInputRef.value = "";
      });
    </script>
  </body>
</html>
