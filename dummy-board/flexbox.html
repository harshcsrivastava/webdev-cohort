<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
            *{
                box-sizing: border-box;
                background-color: #111;
                color: white;
            }
            body{
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .parent{
                border: 4px solid #fff;
                width: 80vw;
                height: 40vh;
                padding: 8px;
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .child{
                border: 4px solid #fff;
                width: 100px;
                height: 100px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .child-1{
                flex-grow: 2;
            }
            .child-2{
                flex-grow: 1;
            }
            .child-3{
                order: 2;
            }
            .child-4{
                order: 1;
            }
            .child-5{
                order: 2;
            }

        </style>
</head>
<body>
    <div class="parent">
        <div class="child child-1">1</div>
        <div class="child child-2">2</div>
        <div class="child child-3">3</div>
        <div class="child child-4">4</div>
        <div class="child child-5">5</div>
    </div>
</body>
</html>
