<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Location Sharing Application</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />

        <style>
            #map {
                height: 80vh;
            }
        </style>
    </head>
    <body>
        <h1>Hi</h1>
        <div id="map"></div>

        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>
        <script src="/socket.io/socket.io.js"></script>
        <script>
            const map = L.map("map").setView([28.6139, 77.209], 12);
            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution:
                    '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            }).addTo(map);

            const remoteMarkers = new Map();

            const socket = io();
            socket.on("server:location:update", (data) => {
                const { id, latitude, longitude } = data;

                if (!remoteMarkers.has(id)) {
                    const marker = L.marker([latitude, longitude]);
                    marker.addTo(map).bindPopup(id);
                    remoteMarkers.set(id, marker);
                } else {
                    const existingMarker = remoteMarkers.get(id);
                    existingMarker.setLatLng([latitude, longitude]);
                }
            });

            function getUserCurrentLocation() {
                return new Promise((res, rej) => {
                    if ("geolocation" in navigator) {
                        // navigator.geolocation.getCurrentPosition((postition), (error))
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const latitude = position.coords.latitude;
                                const longitude = position.coords.longitude;

                                res({ latitude, longitude });
                            },
                            (err) => {
                                res(err);
                            },
                            { enableHighAccuracy: true },
                        );
                    } else {
                        alert(`Navigation is not available in browser.`);
                    }
                });
            }

            let myCurrentLocationMarker = null;
            async function main() {
                setInterval(async () => {
                    const { latitude, longitude } =
                        await getUserCurrentLocation();

                    // rider side code
                    socket.emit("client:location:update", {
                        latitude,
                        longitude,
                    });

                    if (!myCurrentLocationMarker) {
                        myCurrentLocationMarker = L.marker([
                            latitude,
                            longitude,
                        ]);
                        myCurrentLocationMarker
                            .addTo(map)
                            .bindPopup("You are here");
                    } else {
                        // marker already hai, usko update karenge, agar usko null nhi krte to naya marker bana deta vo
                        myCurrentLocationMarker.setLatLng([
                            latitude,
                            longitude,
                        ]);
                    }
                }, 10 * 1000);
            }

            window.addEventListener("load", main);
        </script>
    </body>
</html>
