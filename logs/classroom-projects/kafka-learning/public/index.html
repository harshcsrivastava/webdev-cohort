<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Location Sharing Application</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />

        <style>
            #map {
                height: 80vh;
            }
        </style>
    </head>
    <body>
        <h1>Hi</h1>
        <div id="map"></div>

        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>

        <script>
            const map = L.map("map").setView([28.6139, 77.2090], 12);
            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution:
                    '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            }).addTo(map);

            function getUserCurrentLocation() {
                return new Promise((res, rej) => {
                    if ("geolocation" in navigator) {
                        // navigator.geolocation.getCurrentPosition((postition), (error))
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const lat = position.coords.latitude;
                                const long = position.coords.longitude;

                                res({ lat, long });
                            },
                            (err) => {
                                res(err);
                            },
                            { enableHighAccuracy: true },
                        );
                    } else {
                        alert(`Navigation is not available in browser.`);
                    }
                });
            }

            async function main() {
                const userLocation = await getUserCurrentLocation();
                L.marker([userLocation.lat, userLocation.long])
                    .addTo(map)
                    .bindPopup("You are here");
            }

            window.addEventListener("load", main);
        </script>
    </body>
</html>
