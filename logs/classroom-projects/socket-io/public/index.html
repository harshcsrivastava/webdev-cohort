<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chat UI</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                background-color: #f0f2f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .chat-container {
                width: 100%;
                max-width: 450px;
                height: 80vh;
                background: white;
                display: flex;
                flex-direction: column;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                border-radius: 12px;
                overflow: hidden;
            }

            /* Header */
            .chat-header {
                padding: 15px 20px;
                background: #007bff;
                color: white;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .status-dot {
                width: 10px;
                height: 10px;
                background: #2ecc71;
                border-radius: 50%;
            }

            /* Message Area */
            .chat-messages {
                flex: 1;
                padding: 20px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 15px;
                background: #f9f9f9;
            }

            .message {
                max-width: 80%;
                padding: 10px 15px;
                border-radius: 18px;
                font-size: 0.95rem;
                line-height: 1.4;
            }

            .received {
                align-self: flex-start;
                background: #e4e6eb;
                color: #050505;
                border-bottom-left-radius: 2px;
            }

            .sent {
                align-self: flex-end;
                background: #007bff;
                color: white;
                border-bottom-right-radius: 2px;
            }

            /* Input Area */
            .chat-input-area {
                padding: 15px;
                background: white;
                display: flex;
                gap: 10px;
                border-top: 1px solid #ddd;
            }

            input[type="text"] {
                flex: 1;
                padding: 10px 15px;
                border: 1px solid #ddd;
                border-radius: 25px;
                outline: none;
                transition: border-color 0.2s;
            }

            input[type="text"]:focus {
                border-color: #007bff;
            }

            button {
                background: #007bff;
                color: white;
                border: none;
                padding: 0 20px;
                border-radius: 25px;
                cursor: pointer;
                font-weight: 600;
                transition: background 0.2s;
            }

            button:hover {
                background: #0056b3;
            }

            .typing-bubble {
                display: inline-block;
                background: #e4e6eb;
                color: #050505;
                border-radius: 18px;
                padding: 10px 18px 10px 14px;
                min-width: 40px;
                min-height: 20px;
                margin-bottom: 2px;
                align-self: flex-start;
                position: relative;
            }

            .typing-dot {
                display: inline-block;
                width: 7px;
                height: 7px;
                margin: 0 2px;
                background: #b0b3b8;
                border-radius: 50%;
                opacity: 0.6;
                animation: typingBlink 1s infinite;
            }

            .typing-dot:nth-child(2) {
                animation-delay: 0.2s;
            }

            .typing-dot:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes typingBlink {
                0%,
                80%,
                100% {
                    opacity: 0.6;
                }
                40% {
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div class="chat-container">
            <div class="chat-header">
                <div class="status-dot"></div>
                <strong>Chat Room</strong>
            </div>

            <div class="chat-messages" id="chatBox">
                <div class="message received">
                    Hi there! How can I help you today?
                </div>
                <div class="message sent">
                    I'm looking for a clean chat UI template.
                </div>
                <div class="message received">
                    You've come to the right place! What do you think of this
                    one?
                </div>
            </div>
            <form class="chat-input-area" id="chatForm">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Type a message..."
                    autocomplete="off"
                />
                <button type="submit">Send</button>
            </form>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();

            // 1. Debounce Helper Function
            function debounce(func, delay) {
                let timer;
                return (...args) => {
                    clearTimeout(timer);
                    timer = setTimeout(() => func.apply(this, args), delay);
                };
            }

            // 2. Typing Logic
            // This will emit the event to the backend 500ms after the last keystroke
            const handleTyping = debounce((text) => {
                socket.emit("user:typing", { text });
                // console.log("Sent 'user:typing' event to backend");
            }, 300);

            const chatForm = document.getElementById("chatForm");
            const chatBox = document.getElementById("chatBox");
            const userInput = document.getElementById("userInput");

            // Attach the debounced function to the input event
            userInput.addEventListener("input", (e) => {
                const text = e.target.value;
                if (!text) return;
                handleTyping(text);
            });

            socket.on("server:message", (data) => {
                // console.log("Message from server ", data);
                appendMessage(data.message, "received");
            });

            socket.on("server:typing", (data) => {
                // Remove any existing typing bubble
                const existing = document.getElementById("typing-bubble");
                if (existing) existing.remove();
                // Create typing bubble
                const typingDiv = document.createElement("div");
                typingDiv.className = "message received typing-bubble";
                typingDiv.id = "typing-bubble";
                typingDiv.innerHTML =
                    '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
                chatBox.appendChild(typingDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
                // Remove after 1 second
                if (window.typingTimeout) clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => {
                    typingDiv.remove();
                }, 1000);
            });

            function onMessageInput(message) {
                socket.emit("user:message", { message });
            }

            function appendMessage(messageText, type) {
                // Remove typing bubble if present before appending a new received message
                if (type === "received") {
                    const existing = document.getElementById("typing-bubble");
                    if (existing) existing.remove();
                }
                const messageDiv = document.createElement("div");
                messageDiv.classList.add("message", type);
                messageDiv.textContent = messageText;
                chatBox.appendChild(messageDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            chatForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const messageText = userInput.value.trim();

                if (messageText !== "") {
                    onMessageInput(messageText);
                    appendMessage(messageText, "sent");
                    userInput.value = "";
                }
            });
        </script>
    </body>
</html>
