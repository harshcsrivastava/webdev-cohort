<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>05-react-ts-refresher</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        width: 100%;
      }
      
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      
      #my-react-container {
        width: 100%;
        max-width: 600px;
      }
      
      #my-react-container > div {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      
      #my-react-container > div > div:first-child {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
      }
      
      input[type="text"] {
        flex: 1;
        padding: 14px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        transition: all 0.3s ease;
        background: #f8f9fa;
      }
      
      input[type="text"]:focus {
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      
      input[type="text"]::placeholder {
        color: #999;
      }
      
      button {
        padding: 14px 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }
      
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }
      
      button:active {
        transform: translateY(0);
      }
      
      ul {
        list-style: none;
      }
      
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 18px;
        background: #f8f9fa;
        border-radius: 12px;
        margin-bottom: 12px;
        border-left: 4px solid #667eea;
        transition: all 0.3s ease;
      }
      
      li:hover {
        background: #f0f1ff;
        transform: translateX(4px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      }
      
      li button {
        background: #ff6b6b;
        padding: 8px 12px;
        font-size: 18px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        min-width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      li button:hover {
        background: #ff5252;
        box-shadow: 0 4px 12px rgba(255, 107, 107, 0.5);
      }
      
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body>
   <div id="my-react-container"></div>
    <!-- <div id="root"></div>-->
    <script type="module" src="/src/main.tsx"></script> 
  </body>
</html>
